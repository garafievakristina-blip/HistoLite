name: Deploy to Yandex Cloud

on:
  push:
    branches: [ main ]  # или ваша основная ветка

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install AWS CLI (совместим с Yandex S3)
        run: |
          curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          unzip awscliv2.zip
          sudo ./aws/install

      - name: Upload to Yandex Object Storage
        run: |
          aws s3 sync . s3://histolite.ru --endpoint-url=https://storage.yandexcloud.net --delete
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.YANDEX_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.YANDEX_SECRET_KEY }}
